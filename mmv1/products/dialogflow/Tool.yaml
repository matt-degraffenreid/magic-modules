---
name: Tool
description: |
  Provides a list of actions available to a Generator/Playbook (e.g., OpenAPI call, Function call).
references:
  guides:
    Official Documentation: https://cloud.google.com/agent-assist/docs
  api: https://cloud.google.com/dialogflow/es/docs/reference/rest/v2beta1/projects.locations.tools
base_url: projects/{{project}}/locations/{{location}}/tools
self_link: '{{name}}'
update_mask: true
update_verb: PATCH
import_format:
  - 'projects/{{project}}/locations/{{location}}/tools/{{name}}'
timeouts:
  insert_minutes: 40
  update_minutes: 40
  delete_minutes: 20
custom_code:
  pre_create: templates/terraform/pre_create/dialogflow_set_endpoint.go.tmpl
  pre_read: templates/terraform/pre_create/dialogflow_set_endpoint.go.tmpl
  pre_update: templates/terraform/pre_create/dialogflow_set_endpoint.go.tmpl
  pre_delete: templates/terraform/pre_create/dialogflow_set_endpoint.go.tmpl
samples:
  - name: dialogflow_tool_basic
    primary_resource_id: basic_tool
    steps:
      - name: dialogflow_tool_basic
        resource_id_vars:
          location: us-central1
  - name: dialogflow_tool_function
    primary_resource_id: function_tool
    steps:
      - name: dialogflow_tool_function
        resource_id_vars:
          location: us-central1
  - name: dialogflow_tool_connector
    primary_resource_id: connector_tool
    steps:
      - name: dialogflow_tool_connector
        resource_id_vars:
          location: us-central1
  - name: dialogflow_tool_datastore
    primary_resource_id: datastore_tool
    steps:
      - name: dialogflow_tool_datastore
        resource_id_vars:
          location: us-central1
  - name: dialogflow_tool_auth
    primary_resource_id: auth_tool
    steps:
      - name: dialogflow_tool_auth
        resource_id_vars:
          location: us-central1
  - name: dialogflow_tool_oauth
    primary_resource_id: oauth_tool
    steps:
      - name: dialogflow_tool_oauth
        resource_id_vars:
          location: us-central1
  - name: dialogflow_tool_service_agent
    primary_resource_id: service_agent_tool
    steps:
      - name: dialogflow_tool_service_agent
        resource_id_vars:
          location: us-central1
  - name: dialogflow_tool_bearer
    primary_resource_id: bearer_tool
    steps:
      - name: dialogflow_tool_bearer
        resource_id_vars:
          location: us-central1
parameters:
  - name: project
    type: String
    description: |
      The ID of the project in which the resource belongs.
    url_param_only: true
  - name: location
    type: String
    required: true
    url_param_only: true
    immutable: true
    description: |
      The location of the tool.
properties:
  - name: name
    type: String
    description: |
      The resource name of the tool.
    output: true
  - name: displayName
    type: String
    description: |
      Required. The human-readable name of the tool, unique within the project and location.
    required: true
  - name: description
    type: String
    description: |
      Optional. Human readable description of the tool.
  - name: openApiSpec
    type: NestedObject
    exactly_one_of:
      - 'open_api_spec'
      - 'data_store_spec'
      - 'function_spec'
      - 'connector_spec'
    description: |
      Specification for OpenAPI tool.
      This field is part of a union field `specification`: Only one of `openApiSpec`, `dataStoreSpec`, `functionSpec`, or `connectorSpec` may be set.
    properties:
      - name: authentication
        type: NestedObject
        description: |
          Optional. Authentication information required by the API.
        properties:
          - name: apiKeyConfig
            type: NestedObject
            exactly_one_of:
              - 'api_key_config'
              - 'oauth_config'
              - 'service_agent_auth_config'
              - 'bearer_token_config'
            description: |
              Config for API key auth.
              This field is part of a union field `auth_config`: Only one of `apiKeyConfig`, `oauthConfig`, `serviceAgentAuthConfig`, or `bearerTokenConfig` may be set.
            properties:
              - name: keyName
                type: String
                description: |
                  The parameter name or the header name of the API key.
                required: true
              - name: apiKey
                type: String
                description: |
                  Optional. The API key.
                sensitive: true
              - name: requestLocation
                type: String
                description: |
                  Key location in the request.
                required: true
          - name: oauthConfig
            type: NestedObject
            exactly_one_of:
              - 'api_key_config'
              - 'oauth_config'
              - 'service_agent_auth_config'
              - 'bearer_token_config'
            description: |
              Config for OAuth.
              This field is part of a union field `auth_config`: Only one of `apiKeyConfig`, `oauthConfig`, `serviceAgentAuthConfig`, or `bearerTokenConfig` may be set.
            properties:
              - name: oauthGrantType
                type: String
                description: |
                  OAuth grant types.
                required: true
              - name: clientId
                type: String
                description: |
                  The client ID from the OAuth provider.
                required: true
              - name: clientSecret
                type: String
                description: |
                  Optional. The client secret from the OAuth provider.
                sensitive: true
              - name: tokenEndpoint
                type: String
                description: |
                  The token endpoint in the OAuth provider to exchange for an access token.
                required: true
              - name: scopes
                type: Array
                description: |
                  Optional. The OAuth scopes to grant.
                item_type:
                  type: String
          - name: serviceAgentAuthConfig
            type: NestedObject
            exactly_one_of:
              - 'api_key_config'
              - 'oauth_config'
              - 'service_agent_auth_config'
              - 'bearer_token_config'
            description: |
              Config for service agent auth.
              This field is part of a union field `auth_config`: Only one of `apiKeyConfig`, `oauthConfig`, `serviceAgentAuthConfig`, or `bearerTokenConfig` may be set.
            properties:
              - name: serviceAgentAuth
                type: String
                description: |
                  Optional. Indicate the auth token type generated from the Diglogflow service agent.
          - name: bearerTokenConfig
            type: NestedObject
            exactly_one_of:
              - 'api_key_config'
              - 'oauth_config'
              - 'service_agent_auth_config'
              - 'bearer_token_config'
            description: |
              Config for bearer token auth.
              This field is part of a union field `auth_config`: Only one of `apiKeyConfig`, `oauthConfig`, `serviceAgentAuthConfig`, or `bearerTokenConfig` may be set.
            properties:
              - name: token
                type: String
                description: |
                  Optional. The text token appended to the text Bearer to the request Authorization header.
                sensitive: true
      - name: textSchema
        type: String
        description: |
          Required. The OpenAPI schema in YAML or JSON format.
        required: true
  - name: dataStoreSpec
    type: NestedObject
    exactly_one_of:
      - 'open_api_spec'
      - 'data_store_spec'
      - 'function_spec'
      - 'connector_spec'
    description: |
      Data store search tool specification.
      This field is part of a union field `specification`: Only one of `openApiSpec`, `dataStoreSpec`, `functionSpec`, or `connectorSpec` may be set.
    properties:
      - name: dataStoreConnections
        type: Array
        description: |
          List of data stores to search.
        required: true
        item_type:
          type: NestedObject
          properties:
            - name: dataStoreType
              type: String
              description: |
                The type of the connected data store.
            - name: dataStore
              type: String
              description: |
                The full name of the referenced data store.
            - name: documentProcessingMode
              type: String
              description: |
                The document processing mode for the data store connection.
      - name: fallbackPrompt
        type: NestedObject
        description: |
          Fallback prompt configurations to use.
        required: true
        allow_empty_object: true
        send_empty_value: true
        properties: [] # Meant to be an empty object with no properties.
  - name: functionSpec
    type: NestedObject
    exactly_one_of:
      - 'open_api_spec'
      - 'data_store_spec'
      - 'function_spec'
      - 'connector_spec'
    description: |
      Client side executed function specification.
      This field is part of a union field `specification`: Only one of `openApiSpec`, `dataStoreSpec`, `functionSpec`, or `connectorSpec` may be set.
    properties:
      - name: inputSchema
        type: String
        description: |
          Optional. The JSON schema describing the input of the function.
        state_func: func(v interface{}) string { s, _ := structure.NormalizeJsonString(v); return s }
        custom_flatten: templates/terraform/custom_flatten/json_schema.tmpl
        custom_expand: templates/terraform/custom_expand/json_schema.tmpl
        validation:
          function: validation.StringIsJSON
      - name: outputSchema
        type: String
        description: |
          Optional. The JSON schema describing the output of the function.
        state_func: func(v interface{}) string { s, _ := structure.NormalizeJsonString(v); return s }
        custom_flatten: templates/terraform/custom_flatten/json_schema.tmpl
        custom_expand: templates/terraform/custom_expand/json_schema.tmpl
        validation:
          function: validation.StringIsJSON
  - name: connectorSpec
    type: NestedObject
    exactly_one_of:
      - 'open_api_spec'
      - 'data_store_spec'
      - 'function_spec'
      - 'connector_spec'
    description: |
      Integration connectors tool specification.
      This field is part of a union field `specification`: Only one of `openApiSpec`, `dataStoreSpec`, `functionSpec`, or `connectorSpec` may be set.
    properties:
      - name: authentication
        type: NestedObject
        description: |
          Optional. Authentication information required by the API.
        properties:
          - name: apiKeyConfig
            type: NestedObject
            exactly_one_of:
              - 'api_key_config'
              - 'oauth_config'
              - 'service_agent_auth_config'
              - 'bearer_token_config'
            description: |
              Config for API key auth.
              This field is part of a union field `auth_config`: Only one of `apiKeyConfig`, `oauthConfig`, `serviceAgentAuthConfig`, or `bearerTokenConfig` may be set.
            properties:
              - name: keyName
                type: String
                description: |
                  The parameter name or the header name of the API key.
                required: true
              - name: apiKey
                type: String
                description: |
                  Optional. The API key.
                sensitive: true
              - name: requestLocation
                type: String
                description: |
                  Key location in the request.
                required: true
          - name: oauthConfig
            type: NestedObject
            exactly_one_of:
              - 'api_key_config'
              - 'oauth_config'
              - 'service_agent_auth_config'
              - 'bearer_token_config'
            description: |
              Config for OAuth.
              This field is part of a union field `auth_config`: Only one of `apiKeyConfig`, `oauthConfig`, `serviceAgentAuthConfig`, or `bearerTokenConfig` may be set.
            properties:
              - name: oauthGrantType
                type: String
                description: |
                  OAuth grant types.
                required: true
              - name: clientId
                type: String
                description: |
                  The client ID from the OAuth provider.
                required: true
              - name: clientSecret
                type: String
                description: |
                  Optional. The client secret from the OAuth provider.
                sensitive: true
              - name: tokenEndpoint
                type: String
                description: |
                  The token endpoint in the OAuth provider to exchange for an access token.
                required: true
              - name: scopes
                type: Array
                description: |
                  Optional. The OAuth scopes to grant.
                item_type:
                  type: String
          - name: serviceAgentAuthConfig
            type: NestedObject
            exactly_one_of:
              - 'api_key_config'
              - 'oauth_config'
              - 'service_agent_auth_config'
              - 'bearer_token_config'
            description: |
              Config for service agent auth.
              This field is part of a union field `auth_config`: Only one of `apiKeyConfig`, `oauthConfig`, `serviceAgentAuthConfig`, or `bearerTokenConfig` may be set.
            properties:
              - name: serviceAgentAuth
                type: String
                description: |
                  Optional. Indicate the auth token type generated from the Diglogflow service agent.
          - name: bearerTokenConfig
            type: NestedObject
            exactly_one_of:
              - 'api_key_config'
              - 'oauth_config'
              - 'service_agent_auth_config'
              - 'bearer_token_config'
            description: |
              Config for bearer token auth.
              This field is part of a union field `auth_config`: Only one of `apiKeyConfig`, `oauthConfig`, `serviceAgentAuthConfig`, or `bearerTokenConfig` may be set.
            properties:
              - name: token
                type: String
                description: |
                  Optional. The text token appended to the text Bearer to the request Authorization header.
                sensitive: true
      - name: name
        type: String
        required: true
        description: |
          The full resource name of the referenced Integration Connectors Connection.
      - name: actions
        type: Array
        required: true
        description: |
          Actions for the tool to use.
        item_type:
          type: NestedObject
          properties:
            - name: inputFields
              type: Array
              description: |
                Entity fields to use as inputs for the operation.
              item_type:
                type: String
            - name: outputFields
              type: Array
              description: |
                Entity fields to return from the operation.
              item_type:
                type: String
            - name: connectionActionId
              type: String
              exactly_one_of:
                - 'connection_action_id'
                - 'entity_operation'
              description: |
                ID of a Connection action for the tool to use.
            - name: entityOperation
              type: NestedObject
              exactly_one_of:
                - 'connection_action_id'
                - 'entity_operation'
              description: |
                Entity operation configuration for the tool to use.
              properties:
                - name: entityId
                  type: String
                  description: |
                    ID of the entity.
                  required: true
                - name: operation
                  type: Enum
                  description: |
                    The operation to perform on the entity.
                  enum_values:
                    - LIST
                    - CREATE
                    - UPDATE
                    - DELETE
                    - GET
                  required: true
